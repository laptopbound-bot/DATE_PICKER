<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATEPICKER</title>
    <style>
        body{
            background-color:black;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        #main_container{
            height: 500px;
            width: 400px;
            background-color: white;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #date_contain{
            width: 75%;
            height: 7%;
            display: flex;
            border: 2px black solid;
        }
        #date_contain2{
            width: 75%;
            height: 65%;
            margin-top: 1.5px;
            border: 2px black solid;
        }
        #dmy{
            width: 85%;
            height: 100%;
            align-items: center;
            justify-content: center;
            display: flex;
        }
        #calendar{
            width: 15%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid black;
        }
        #p1{
            font-size: 17px;
            font-weight: bold;
            margin-left: -80px;
        }
        #img{
            height: 100%;
            width: 50%;
        }
        #dec22{
            width: 100%;
            height: 22%;
            border: 1px solid black;
            display: flex;
            flex-direction: column;
        }
        #dates{
            width: 100%;
            height: 78%;
        }
        #p2{
            font-size: 20px;

        }
        #dec22_1{
            height: 50%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #dec22_2{
            height: 50%;
            width: 100%;
            display: flex;
            gap: 35px;
        }
        #leftarrow{
            width: 20%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #rightarrow{
            width: 20%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #centertext{
            width: 60%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            
        }
    </style>
</head>
<body>
    <div id="main_container">
        <div id="date_contain">
            <div id="dmy"><p id="p1">dd / mm / yyyy</p></div>
            <div id="calendar"><img id="img" src="calendar.png" alt=""></div>
        </div>
        <div id="date_contain2">
            <div id="dec22">
                <div id="dec22_1">
                    <div id="leftarrow">◀️</div>
                    <div id="centertext"><p id="p2">    December 2022    </p></div>
                    <div id="rightarrow">▶️</div>
                </div>
                <div id="dec22_2">
                    <p>S</p>
                    <p>M</p>
                    <p>T</p>
                    <p>W</p>
                    <p>T</p>
                    <p>F</p>
                    <p>S</p>
                </div>
            </div>
            <div id="dates">
                
            </div>
        </div>
    </div>
</body>
</html>
